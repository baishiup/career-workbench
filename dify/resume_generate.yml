      - data:
          code: "function main({ llm_output }) {\n  let value = llm_output;\n  if (typeof value === 'string') {\n    value = value.trim().replace(/^```(?:json)?\\s*/i, '').replace(/\\s*```$/i, '');\n    value = JSON.parse(value);\n  }\n  if (!value || typeof value !== 'object' || !Array.isArray(value.modules)) {\n    throw new Error('ResumeDocument is invalid');\n  }\n  return { text: JSON.stringify(value) };\n}\n"
          code_language: javascript
          desc: 归一化 LLM 输出，最终 text 必须是 ResumeDocument JSON 字符串。
          outputs:
            text:
              children: null
              type: string
          selected: false
          title: 输出归一化
