    - data:
        code: "function main({ raw_text }) {\n  const source = String(raw_text ||\
          \ \"\");\n  const normalized = source\n    .replace(/\\u0000/g, \"\")\n\
          \    .replace(/\\r\\n?/g, \"\\n\")\n    .replace(/[ \\t]+/g, \" \")\n  \
          \  .split(\"\\n\")\n    .map((line) => line.trim())\n    .filter((line)\
          \ => line.length > 0)\n    .filter((line) => !/^page\\s*\\d+\\s*(of\\s*\\\
          d+)?$/i.test(line))\n    .filter((line, index, lines) => index === 0 ||\
          \ line !== lines[index - 1])\n    .join(\"\\n\")\n    .replace(/\\n{3,}/g,\
          \ \"\\n\\n\")\n    .trim();\n\n  const limit = 18000;\n  const cleaned =\
          \ normalized.length > limit\n    ? `${normalized.slice(0, 14000)}\\n\\n[TRUNCATED_BY_PREPROCESSOR]\\\
          n\\n${normalized.slice(-3000)}`\n    : normalized;\n\n  return {\n    cleaned_text:\
          \ cleaned,\n    original_chars: source.length,\n    cleaned_chars: cleaned.length,\n\
          \    truncated: normalized.length > limit\n  };\n}\n"
        code_language: javascript
        desc: 清洗 PDF 文本并限制 LLM 输入长度，降低解析耗时。
        outputs:
          cleaned_chars:
            children: null
            type: number
          cleaned_text:
            children: null
            type: string
          original_chars:
            children: null
            type: number
          truncated:
            children: null
            type: boolean
        selected: false
        title: 文本预处理
        type: code
        variables:
        - value_selector:
          - '1780679045741'
          - text
          variable: raw_text
