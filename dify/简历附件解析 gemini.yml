    - data:
        code: "function main({ raw_json }) {\n  const source = String(raw_json ||\
          \ \"\").trim();\n  const jsonText = source\n    .replace(/^```(?:json)?\\\
          s*/i, \"\")\n    .replace(/\\s*```$/i, \"\");\n\n  let parsed;\n  try {\n\
          \    parsed = JSON.parse(jsonText);\n  } catch (error) {\n    return { normalized_json:\
          \ jsonText };\n  }\n\n  function normalize(value) {\n    if (Array.isArray(value))\
          \ {\n      return value.map(normalize);\n    }\n\n    if (value && typeof\
          \ value === \"object\") {\n      return Object.fromEntries(\n        Object.entries(value).map(([key,\
          \ child]) => [key, normalize(child)])\n      );\n    }\n\n    return value\
          \ === \"\" ? null : value;\n  }\n\n  return {\n    normalized_json: JSON.stringify(normalize(parsed))\n\
          \  };\n}"
        code_language: javascript
        desc: 把 Gemini 兼容 schema 里的空字符串恢复为后端期望的 null。
        outputs:
          normalized_json:
            children: null
            type: string
        selected: false
        title: 输出归一化
        type: code
        variables:
