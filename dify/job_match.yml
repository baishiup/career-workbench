      - data:
          code: |
            function main({ raw_json }) {
              const source = String(raw_json || "").trim();
              const jsonText = source
                .replace(/^```(?:json)?\s*/i, "")
                .replace(/\s*```$/i, "");

              let parsed;
              try {
                parsed = JSON.parse(jsonText);
              } catch (error) {
                return { normalized_json: jsonText };
              }

              function toStringList(value) {
                if (!Array.isArray(value)) {
                  return [];
                }
                return value
                  .filter((item) => typeof item === "string" && item.trim())
                  .map((item) => item.trim());
              }

              return {
                normalized_json: JSON.stringify({
                  schema_version: "job.match.v1",
                  evidence: toStringList(parsed.evidence),
                  gaps: toStringList(parsed.gaps),
                  risks: toStringList(parsed.risks),
                  ai_note: typeof parsed.ai_note === "string" ? parsed.ai_note.trim() : ""
                })
              };
            }
          code_language: javascript
          desc: 兜底解析 code fence，并把叙事字段归一化成稳定形状。
          outputs:
            normalized_json:
              children: null
              type: string
          selected: false
          title: 输出归一化
          type: code
          variables:
            - value_selector:
                - "1786000000002"
                - text
              variable: raw_json
        height: 96
        id: "1786000000003"
        position:
          x: 400
          y: 240
        positionAbsolute:
          x: 400
          y: 240
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 242
      - data:
          desc: 生成最终内容
          outputs:
            - value_selector:
                - "1786000000003"
                - normalized_json
              value_type: string
              variable: text
          selected: false
          title: Output
          type: end
        height: 116
