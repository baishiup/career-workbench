      - data:
          context:
            enabled: false
            variable_selector: []
          desc: 围绕规则匹配结果生成 evidence / gaps / risks / ai_note 叙事，不打分。
          model:
            completion_params:
              temperature: 0
              thinking_mode: false
            mode: chat
            name: gemini-2.5-flash
            provider: langgenius/gemini/google
          prompt_template:
            - id: b2e4d3f5-0001-4abc-8def-job-match-sys
              role: system
              text:
                '你是一个求职匹配叙事分析器。输入是候选人 Profile（JSON）、结构化职位描述（JSON）和代码规则计算出的匹配结果（JSON，含分数、等级和命中/缺失技能明细）。


                你的职责是解释和展开规则匹配结果，不是重新评分。绝对禁止输出任何数字分数、百分比或等级标签；分数永远以规则结果为准。


                输出四类叙事，全部使用中文：

                1. evidence（命中证据）：从 Profile 的工作经历、项目、技能中找出能支撑该职位要求的具体事实。每条必须能追溯到 Profile 中的真实内容，不得虚构。最多 5 条，每条不超过 80 字。

                2. gaps（能力缺口）：结合规则结果中的缺失技能和 JD 要求，指出 Profile 缺少或证据不足的部分，并给出可执行的补救方向（如何在简历中补证据、如何如实表述相近经验）。最多 5 条，每条不超过 80 字。

                3. risks（风险表达）：投递或简历表述中需要注意的风险，例如容易被夸大的经验、年限差距、远程协作或语言要求。表达要诚实，不鼓励美化。最多 4 条，每条不超过 80 字。

                4. ai_note（总评叙事）：围绕规则匹配等级展开的整体判断和投递建议，不超过 120 字，不出现具体分数。


                输出要求：

                1. 只输出 JSON 对象，必须符合 Structured Output JSON Schema。

                2. schema_version 固定为 "job.match.v1"。

                3. 某一类没有内容时输出空数组，不要编造凑数。

                '
            - id: b2e4d3f5-0002-4abc-8def-job-match-usr
              role: user
              text: "候选人 Profile（JSON）：


                {{#1786000000001.profile_json#}}


                结构化职位描述（JSON）：


                {{#1786000000001.job_json#}}


                代码规则匹配结果（JSON，分数与等级以此为准）：


                {{#1786000000001.rule_match_json#}}

                "
          selected: false
          structured_output:
            schema:
              properties:
                ai_note:
                  type: string
                evidence:
                  items:
                    type: string
                  type: array
                gaps:
                  items:
                    type: string
                  type: array
                risks:
                  items:
                    type: string
                  type: array
                schema_version:
                  enum:
                    - job.match.v1
                  type: string
              required:
                - schema_version
                - evidence
                - gaps
                - risks
                - ai_note
              type: object
          structured_output_enabled: true
          title: LLM 叙事分析
          type: llm
          vision:
            enabled: false
        height: 148
