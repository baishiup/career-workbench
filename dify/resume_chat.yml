                changes:
                  type: array
                  items:
                    type: object
                    required:
                      - moduleId
                      - data
                    properties:
                      moduleId:
                        type: string
                      data:
                        type: object
                        required:
                          - id
                          - kind
                          - visible
                        properties:
                          id:
                            type: string
                          kind:
                            type: string
                            enum:
                              - personal
                              - preferences
