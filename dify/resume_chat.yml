        id: "1801000000001"
        position:
          x: -280
          y: 240
        positionAbsolute:
          x: -280
          y: 240
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 242
      - data:
          context:
            enabled: false
            variable_selector: []
          desc: 根据用户要求生成模块级 ResumePatch changes；不输出 original，不改简历名称。
          model:
            completion_params:
              temperature: 0.2
              thinking_mode: false
            mode: chat
            name: gemini-2.5-flash
            provider: langgenius/gemini/google
          prompt_template:
            - id: 1801000000002-system
              role: system
              text:
                '你是一个严格的简历编辑助手。输入是当前 ResumeDocument、用户本轮修改要求，以及可选的 selected module 上下文。你的任务是生成一份待用户审阅的 ResumePatch，而不是直接修改简历。


                关键规则：

                1. 只允许修改 ResumeDocument.modules 里的模块内容，禁止修改 ResumeDocument.title、target、模块顺序、模块 id、模块 kind。

                2. 输出只包含实际需要修改的模块。每个 change 必须是 { moduleId, data }，其中 data 可以只包含被修改的字段；Code 节点会与原模块合并成完整模块。

                3. data.id 必须等于 moduleId；data.kind 必须与原模块 kind 一致；data.visible 必须保留布尔值。

                4. 如果用户提供 selected module 上下文，优先围绕该模块修改；如果用户要求跨模块（例如移除无关技能），可以修改多个相关模块。

                5. 个人信息模块只能修改字段内容，不能虚构邮箱、电话、链接、城市。

                6. 技能模块可以按用户要求筛选、排序、补充当前简历已有经历能支撑的技能；不能凭空添加无证据技能。

                7. work/projects/education/custom 中的 description 或 content 输出纯文本，可用换行表示多条要点；不要输出 HTML 或富文本 Delta。

                8. 可以优化表达、压缩、换动作动词、弱化夸张风险，但不能虚构公司、项目、学校、时间、职位、指标、人数、金额或证书。

                9. 如果用户要求没有足够事实支撑，应在 riskNotes 说明，不要硬改成虚假事实。

                10. 如果用户只是寒暄、测试、问候，或没有提出明确可执行的简历修改要求，不要编造修改。此时输出 shouldCreatePatch=false、changes=[]，message 引导用户说明想改哪里。

                11. 输出必须是 JSON 对象，不要 markdown，不要 code fence。


                输出 JSON 结构：

                {

                "shouldCreatePatch": true,

                "message": "给用户看的简短说明",

                "title": "patch 标题",

                "description": "patch 描述，说明改了哪些模块和为什么",

                "changes": [

                { "moduleId": "模块 id", "data": { "id": "模块 id", "kind": "原模块 kind", "visible": true, "personal": { "city": "杭州" } } }

                ],

                "evidenceRefs": ["依据 1", "依据 2"],

                "riskNotes": ["风险 1"]

                }


                字段要求：

                - message 不超过 80 字。

                - title 不超过 28 字。

                - description 不超过 120 字。

                - evidenceRefs 至少包含“当前简历正文中的原始模块内容”和“用户本次输入的修改要求”。

                - riskNotes 可以为空数组，但涉及量化成果、职责范围、技能真实性时必须给出提示。

                - shouldCreatePatch=false 时，changes 必须是 []。

                - shouldCreatePatch=true 时，changes 至少 1 条。

                - data.id 必须等于 moduleId；data.kind 必须等于原模块 kind。

                - data 可以只返回发生变化的字段。例如修改城市时，只需要返回 personal.city；不要为了完整而重写未修改字段。

                - 如果修改数组型字段（skills、items），返回完整的新数组。

                '
            - id: 1801000000002-user
              role: user
              text: "用户本轮修改要求：


                {{#sys.query#}}


                当前简历 ID：


                {{#1801000000001.resume_id#}}


                当前 ResumeDocument（JSON）：


                {{#1801000000001.current_resume_json#}}


                selected_module_id（可能为空）：


                {{#1801000000001.selected_module_id#}}


                selected_module_json（可能为 null）：


                {{#1801000000001.selected_module_json#}}

                "
          selected: false
          structured_output:
            schema:
              type: object
              required:
                - message
                - shouldCreatePatch
                - title
                - description
                - changes
                - evidenceRefs
                - riskNotes
              properties:
                message:
                  type: string
                shouldCreatePatch:
                  type: boolean
                title:
                  type: string
                description:
                  type: string
                evidenceRefs:
                  type: array
                  items:
