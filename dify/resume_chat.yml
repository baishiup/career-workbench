                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    label:
                                      type: string
                                    value:
                                      type: string
                          preferences:
                            type: object
                            properties:
                              jobFunction:
                                type: string
                              jobTypes:
                                type: array
                                items:
                                  type: string
                              openToRemote:
                                type: boolean
                              targetCity:
                                type: string
                              salaryExpectation:
                                type: string
                              customFields:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    label:
                                      type: string
                                    value:
                                      type: string
                          skills:
                            type: array
                            items:
                              type: string
                          items:
                            type: array
                            items:
                              type: object
                              required:
                                - id
                              properties:
                                id:
                                  type: string
                                company:
                                  type: string
                                title:
                                  type: string
                                name:
                                  type: string
                                role:
                                  type: string
                                school:
                                  type: string
                                degree:
                                  type: string
                                major:
