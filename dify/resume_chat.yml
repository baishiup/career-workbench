                                endDate:
                                  type: string
                                current:
                                  type: boolean
                                description:
                                  type: string
                                skills:
                                  type: array
                                  items:
                                    type: string
                          module:
                            type: object
                            properties:
                              id:
                                type: string
                              name:
                                type: string
                              content:
                                type: string
          structured_output_enabled: true
          title: LLM 生成 Patch
          type: llm
          vision:
            enabled: false
        height: 148
        id: "1801000000002"
        position:
          x: 60
          y: 240
        positionAbsolute:
          x: 60
          y: 240
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 242
      - data:
          code: |
            function main({ llm_output, current_resume_json }) {
              function parseJson(value, label) {
                if (typeof value !== "string") {
                  return value;
                }
                const text = value.trim()
                  .replace(/^```(?:json)?\s*/i, "")
                  .replace(/\s*```$/i, "");
                try {
                  return JSON.parse(text);
                } catch (error) {
                  throw new Error(label + " is not valid JSON");
                }
              }

              function asString(value, fallback) {
                return typeof value === "string" && value.trim()
                  ? value.trim()
                  : fallback;
              }

              function asStringArray(value) {
                if (!Array.isArray(value)) {
                  return [];
                }
                return value
                  .filter((item) => typeof item === "string" && item.trim())
                  .map((item) => item.trim());
              }

              function isObject(value) {
                return value && typeof value === "object" && !Array.isArray(value);
              }

              function mergeModule(original, data, moduleId) {
                if (!isObject(data)) {
                  throw new Error("Patch data must be an object: " + moduleId);
                }
                if (data.id !== moduleId) {
                  throw new Error("Patch data.id must equal moduleId: " + moduleId);
                }
                if (typeof data.kind !== "string") {
                  throw new Error("Patch data.kind is required: " + moduleId);
                }
                if (data.kind !== original.kind) {
                  throw new Error("Patch data.kind must keep original kind: " + moduleId);
                }

                const merged = { ...original, ...data, id: original.id, kind: original.kind };
                if (typeof data.visible !== "boolean") {
                  merged.visible = Boolean(original.visible);
                }

                if (original.kind === "personal") {
                  merged.personal = { ...(original.personal || {}), ...(isObject(data.personal) ? data.personal : {}) };
                }
                if (original.kind === "preferences") {
                  merged.preferences = { ...(original.preferences || {}), ...(isObject(data.preferences) ? data.preferences : {}) };
                }
                if (original.kind === "skills") {
                  merged.skills = Array.isArray(data.skills) ? data.skills.filter((item) => typeof item === "string") : original.skills;
                }
                if (original.kind === "work" || original.kind === "projects" || original.kind === "education") {
                  merged.items = Array.isArray(data.items) ? data.items : original.items;
                }
                if (original.kind === "custom") {
                  merged.module = { ...(original.module || {}), ...(isObject(data.module) ? data.module : {}) };
                }

                return merged;
              }

              const document = parseJson(current_resume_json, "current_resume_json");
              const parsed = parseJson(llm_output, "llm_output");

              if (!isObject(document) || !Array.isArray(document.modules)) {
                throw new Error("current_resume_json must be a ResumeDocument");
              }
              if (!isObject(parsed) || !Array.isArray(parsed.changes)) {
                throw new Error("LLM output must contain changes[]");
              }

              const shouldCreatePatch = parsed.shouldCreatePatch !== false;

              const modulesById = new Map(
                document.modules
                  .filter((module) => isObject(module) && typeof module.id === "string")
                  .map((module) => [module.id, module])
              );

              const changes = [];
              for (const change of parsed.changes) {
                if (!isObject(change) || !isObject(change.data)) {
                  continue;
                }
                const moduleId = asString(change.moduleId || change.module_id, "");
                const original = modulesById.get(moduleId);
                const data = change.data;

                if (!moduleId || !original) {
                  continue;
                }
                changes.push({ moduleId, data: mergeModule(original, data, moduleId) });
              }

              const resolvedShouldCreatePatch = shouldCreatePatch && changes.length > 0;

              return {
                text: JSON.stringify({
                  message: asString(
                    parsed.message,
                    resolvedShouldCreatePatch
                      ? `我生成了 ${changes.length} 个模块的修改建议。请先查看预览高亮和 Diff，再决定采纳或拒绝。`
                      : "请告诉我你希望修改简历的具体方向。"
                  ),
                  shouldCreatePatch: resolvedShouldCreatePatch,
                  title: asString(parsed.title, "AI 修改建议"),
                  description: asString(
                    parsed.description,
                    resolvedShouldCreatePatch
                      ? "根据用户要求生成 AI 修改建议，只修改模块内容，不修改简历名称。"
                      : "本轮没有生成简历修改建议。"
                  ),
                  changes,
                  evidenceRefs: asStringArray(parsed.evidenceRefs || parsed.evidence_refs),
                  riskNotes: asStringArray(parsed.riskNotes || parsed.risk_notes)
                })
              };
            }
          code_language: javascript
          desc: 校验并归一化 LLM 输出。最终 text 是后端可解析的 ResumePatch JSON。
          outputs:
            text:
              children: null
              type: string
          selected: false
          title: 输出归一化
          type: code
          variables:
            - value_selector:
                - "1801000000002"
                - text
              variable: llm_output
            - value_selector:
                - "1801000000001"
                - current_resume_json
              variable: current_resume_json
        height: 96
        id: "1801000000003"
        position:
          x: 400
          y: 240
        positionAbsolute:
          x: 400
          y: 240
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 242
      - data:
          answer: "{{#1801000000003.text#}}"
          desc: 返回 JSON 字符串给 /chat-messages。Edge Function 会从 answer 里解析 message 和 changes。
          selected: false
          title: 直接回复
          type: answer
          variables: []
        height: 104
        id: answer
        position:
          x: 740
          y: 240
        positionAbsolute:
          x: 740
          y: 240
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 242
    viewport:
      x: -360
      y: 160
      zoom: 0.8
  rag_pipeline_variables: []
