<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1720 760" width="1720" height="760" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3ecf8e"/>
      <stop offset="1" stop-color="#149eca"/>
    </linearGradient>
  </defs>

  <rect width="1720" height="760" fill="url(#bg)"/>
  <!-- subtle grid -->
  <g stroke="#1b2740" stroke-width="1">
    <path d="M0 190 H1720 M0 380 H1720 M0 570 H1720"/>
    <path d="M430 0 V760 M860 0 V760 M1290 0 V760"/>
  </g>

  <!-- title block -->
  <text x="120" y="300" fill="#f8fafc" font-size="84" font-weight="700" letter-spacing="-1">Career Workbench</text>
  <rect x="124" y="330" width="120" height="6" rx="3" fill="url(#accent)"/>
  <text x="120" y="404" fill="#cbd5e1" font-size="36" font-weight="500">AI résumé tailoring that's traceable — not hallucinated.</text>
  <text x="120" y="456" fill="#94a3b8" font-size="26">Fact library × target JD → evidence-anchored, editable résumé.</text>

  <!-- pipeline chips -->
  <g font-size="24" font-weight="600">
    <g transform="translate(120,540)">
      <rect width="220" height="64" rx="12" fill="#15233c" stroke="#27395a" stroke-width="1"/>
      <text x="110" y="40" fill="#e2e8f0" text-anchor="middle">Upload résumé</text>
    </g>
    <text x="356" y="580" fill="#3ecf8e" font-size="30">→</text>
    <g transform="translate(396,540)">
      <rect width="200" height="64" rx="12" fill="#15233c" stroke="#27395a"/>
      <text x="100" y="40" fill="#e2e8f0" text-anchor="middle">Fact library</text>
    </g>
    <text x="612" y="580" fill="#3ecf8e" font-size="30">→</text>
    <g transform="translate(652,540)">
      <rect width="190" height="64" rx="12" fill="#15233c" stroke="#27395a"/>
      <text x="95" y="40" fill="#e2e8f0" text-anchor="middle">AI match</text>
    </g>
    <text x="858" y="580" fill="#3ecf8e" font-size="30">→</text>
    <g transform="translate(898,540)">
      <rect width="240" height="64" rx="12" fill="#15233c" stroke="#27395a"/>
      <text x="120" y="40" fill="#e2e8f0" text-anchor="middle">Tailored résumé</text>
    </g>
  </g>

  <!-- tech tags -->
  <g font-size="22" fill="#7c8aa5">
    <text x="120" y="680">React 19</text>
    <text x="260" y="680">·  TypeScript strict</text>
    <text x="520" y="680">·  Supabase + Edge (Deno)</text>
    <text x="880" y="680">·  Dify workflows</text>
    <text x="1110" y="680">·  pnpm monorepo</text>
  </g>

  <!-- placeholder note (remove when real screenshot is dropped in) -->
  <text x="1600" y="60" font-size="18" text-anchor="end" fill="#475569">placeholder — replace with product screenshot</text>
</svg>
